                          </source>
                      </outbound>
                      <inbound>
                          <strength>strong</strength>
                          <target>
                              <path>displayName</path>
                          </target>
                      </inbound>
                  </attribute>
                  <attribute>
                      <ref>ri:description</ref>
                      <displayName>Description</displayName>
                      <outbound>
                          <strength>strong</strength>
                          <source>
                              <path>description</path>
                          </source>
                      </outbound>
                      <inbound>
                          <strength>strong</strength>
                          <target>
                              <path>description</path>
                          </target>
                      </inbound>
                  </attribute>
                  <attribute>
                      <ref>ri:protocol</ref>
                      <displayName>Protocol</displayName>
                      <outbound>
                          <strength>strong</strength>
                          <source>
                              <path>extension/protocol</path>
                          </source>
                          <expression>
                              <script>
                                  <code>
                                  if (protocol != null) {
                                      return protocol
                                  } else {
                                      return "openid-connect"
                                  }
                              </code>
                              </script>
                          </expression>
                      </outbound>
                      <inbound>
                          <strength>strong</strength>
                          <target>
                              <path>extension/protocol</path>
                          </target>
                      </inbound>
                  </attribute>
                  <attribute>
                      <ref>ri:secret</ref>
                      <displayName>Client Secret</displayName>
                      <outbound>
                          <strength>strong</strength>
                          <source>
                              <path>extension/clientSecret</path>
                          </source>
                      </outbound>
                      <inbound>
                          <strength>weak</strength>
                          <target>
                              <path>extension/clientSecret</path>
                          </target>
                      </inbound>
                  </attribute>
                  <synchronization>
                      <reaction>
                          <situation>unmatched</situation>
                          <actions>
                              <addFocus/>
                          </actions>
                      </reaction>
                      <reaction>
                          <situation>linked</situation>
                          <actions>
                              <synchronize/>
                          </actions>
                      </reaction>
                      <reaction>
                          <situation>deleted</situation>
                          <actions>
                              <deleteFocus/>
                          </actions>
                      </reaction>
                      <reaction>
                          <situation>unlinked</situation>
                          <actions>
                              <link/>
                          </actions>
                      </reaction>
                  </synchronization>
              </objectType>
          </schemaHandling>
      </resource>

- apiVersion: v1
  kind: ConfigMap
  metadata:
    name: midpoint-extension
    namespace: midpoint
  data:
    extension.xsd: |
      <xsd:schema xmlns:xsd="http://www.w3.org/2001/XMLSchema"
                  xmlns:tns="http://openstandia.jp/midpoint"
                  xmlns:a="http://prism.evolveum.com/xml/ns/public/annotation-3"
                  xmlns:c="http://midpoint.evolveum.com/xml/ns/public/common/common-3"
                  xmlns:t="http://prism.evolveum.com/xml/ns/public/types-3"
                  targetNamespace="http://openstandia.jp/midpoint"
                  elementFormDefault="qualified">
                  
          <xsd:import namespace="http://prism.evolveum.com/xml/ns/public/types-3" />
          <xsd:import namespace="http://midpoint.evolveum.com/xml/ns/public/common/common-3" />
          
          <xsd:complexType name="UserExtensionType">
              <xsd:annotation>
                  <xsd:appinfo>
                      <a:extension ref="c:UserType"/>
                  </xsd:appinfo>
              </xsd:annotation>
              <xsd:sequence>
                  <xsd:element name="userId" type="xsd:string">
                      <xsd:annotation>
                          <xsd:appinfo>
                              <a:indexed>true</a:indexed>
                              <a:displayName>User ID</a:displayName>
                          </xsd:appinfo>
                      </xsd:annotation>
                  </xsd:element>
              </xsd:sequence>
          </xsd:complexType>

          <xsd:complexType name="OrgExtensionType">
              <xsd:annotation>
                  <xsd:appinfo>
                      <a:extension ref="c:OrgType"/>
                  </xsd:appinfo>
              </xsd:annotation>
              <xsd:sequence>
                  <xsd:element name="groupId" type="xsd:string">
                      <xsd:annotation>
                          <xsd:appinfo>
                              <a:indexed>true</a:indexed>
                              <a:displayName>Keycloak Group ID</a:displayName>
                          </xsd:appinfo>
                      </xsd:annotation>
                  </xsd:element>
              </xsd:sequence>
          </xsd:complexType>

          <xsd:complexType name="RoleExtensionType">
              <xsd:annotation>
                  <xsd:appinfo>
                      <a:extension ref="c:RoleType"/>
                  </xsd:appinfo>
              </xsd:annotation>
              <xsd:sequence>
                  <xsd:element name="clientRoleId" type="xsd:string">
                      <xsd:annotation>
                          <xsd:appinfo>
                              <a:indexed>true</a:indexed>
                              <a:displayName>Keycloak Client Role ID</a:displayName>
                          </xsd:appinfo>
                      </xsd:annotation>
                  </xsd:element>
              </xsd:sequence>
          </xsd:complexType>

          <xsd:complexType name="ServiceExtensionType">
              <xsd:annotation>
                  <xsd:appinfo>
                      <a:extension ref="c:ServiceType"/>
                  </xsd:appinfo>
              </xsd:annotation>
              <xsd:sequence>
                  <xsd:element name="clientUUID" type="xsd:string">
                      <xsd:annotation>
                          <xsd:appinfo>
                              <a:indexed>true</a:indexed>
                              <a:displayName>Keycloak Client UUID</a:displayName>
                          </xsd:appinfo>
                      </xsd:annotation>
                  </xsd:element>

                  <xsd:element name="protocol" type="xsd:string">
                      <xsd:annotation>
                          <xsd:appinfo>
                              <a:indexed>true</a:indexed>
                              <a:displayName>Protocol (openid-connect or saml)</a:displayName>
                          </xsd:appinfo>
                      </xsd:annotation>
                  </xsd:element>

                  <xsd:element name="clientSecret" type="t:ProtectedStringType">
                      <xsd:annotation>
                          <xsd:appinfo>
                              <a:indexed>false</a:indexed>
                              <a:displayName>Keycloak Client Secret</a:displayName>
                          </xsd:appinfo>
                      </xsd:annotation>
                  </xsd:element>
              </xsd:sequence>
          </xsd:complexType>

      </xsd:schema>