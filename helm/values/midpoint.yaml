image:
  repository: evolveum/midpoint
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to Chart appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Number of MidPoint replicas.
# Setting >1 automatically enables clustered mode (MP_SET_midpoint_taskManager_clustered=true).
replicaCount: 3

init:
  command: ["/bin/bash", "-c"]
  args:
    - >
      /opt/midpoint/bin/midpoint.sh init-native &&
      curl -v -L -o /opt/midpoint/var/icf-connectors/connector-keycloak-1.1.7-SNAPSHOT.jar
      https://github.com/dedushkin/connector-keycloak/releases/download/v1.1.7-SNAPSHOT-kc26cr-ep4/connector-keycloak-1.1.7-SNAPSHOT.jar

# Service configuration
service:
  type: ClusterIP
  port: 8080
  annotations: {}
  # Session affinity is enabled by default (required for clustered deployments)
  sessionAffinity: ClientIP
  sessionAffinityTimeoutSeconds: 10800

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations:
    nginx.ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/session-cookie-name: midpoint
    nginx.ingress.kubernetes.io/session-cookie-expires: "172800"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
  hosts:
    - host: midpoint.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: midpoint-tls
  #    hosts:
  #      - midpoint.example.com

# HTTPRoute configuration (Gateway API)
httpRoute:
  enabled: true
  annotations: {}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: local-gateway
      namespace: tigera-gateway
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public-gateway
      namespace: tigera-gateway
  hostnames:
    - midpoint.lab.dedushk.in
  # Session persistence via Gateway API v1.1+ SessionPersistence (requires compatible gateway)
  sessionPersistence:
    enabled: true
    sessionName: midpoint
    type: Cookie       # Cookie or Header
    absoluteTimeout: 48h
    # idleTimeout: 1h

# Resource limits and requests
resources: {}
  # limits:
  #   cpu: 2000m
  #   memory: 2Gi
  # requests:
  #   cpu: 500m
  #   memory: 1Gi

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Pod security context
podSecurityContext:
  fsGroup: 1000

# Container security context
securityContext: {}
  # allowPrivilegeEscalation: false
  # capabilities:
  #   drop:
  #     - ALL

# ServiceAccount configuration
serviceAccount:
  create: true
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
  name: ""

# Node selection
nodeSelector: {}
tolerations: []
affinity: {}

# Pod annotations and labels
podAnnotations: {}
podLabels: {}

# Liveness probe
livenessProbe:
  enabled: true
  httpGet: null
  exec:
    command:
      - /bin/sh
      - '-c'
      - /usr/local/bin/healthcheck.sh
  initialDelaySeconds: 30
  periodSeconds: 60
  timeoutSeconds: 30
  failureThreshold: 3
  successThreshold: 1

# Readiness probe
readinessProbe:
  enabled: true
  httpGet:
    path: /midpoint/actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 1
  failureThreshold: 3
  successThreshold: 1

# MidPoint application configuration
midpoint:
  # Initial administrator password.
  # Required on first install. Must meet MidPoint password policy (min 5 chars).
  adminPassword: "changeme"

  # Use an existing secret for the admin password instead of creating one.
  # The secret must contain the key defined in existingSecretKeys.adminPassword.
  # The database password is sourced independently via postgresql.auth.existingSecret
  # or externalDatabase.existingSecret.
  existingSecret: ""
  existingSecretKeys:
    adminPassword: "admin-password"

  # MidPoint home directory persistence (/opt/midpoint/var)
  home:
    persistence:
      enabled: false
      storageClass: ""
      accessMode: ReadWriteOnce
      size: 128Mi
      existingClaim: ""  # only used when replicaCount=1

  # Additional environment variables
  extraEnv: []
  #  - name: MP_SET_midpoint_keystore_keyStorePath
  #    value: /opt/secret-volume/keystore.jceks

  # Additional environment variables from secrets/configmaps
  extraEnvFrom: []

  # Additional volumes
  extraVolumes:
    # keystore
    - name: keystore
      secret:
        secretName: midpoint-keystore
    - name: icf-connectors-store
      emptyDir: {}
    # экстеншны
    - name: extension
      configMap:
        name: midpoint-extension
        items:
          - key: "extension.xsd"
            path: "extension.xsd"
    # импорт объектов
    - name: import
      configMap:
        name: midpoint-import-objects
    - name: eg-https
      secret:
        secretName: eg-https

  # Additional volume mounts
  extraVolumeMounts:
    - name: eg-https
      mountPath: /opt/midpoint/var/certs
      readOnly: false
    - name: keystore
      mountPath: /opt/midpoint/var/keystore.jceks
      subPath: keystore.jceks
      readOnly: false
    - name: extension
      mountPath: /opt/midpoint/var/schema/extension.xsd
      subPath: extension.xsd
      readOnly: true
    - name: icf-connectors-store
      mountPath: /opt/midpoint/var/icf-connectors
    - name: import
      mountPath: /opt/midpoint/var/post-initial-objects
      readOnly: true

# PostgreSQL dependency configuration
postgresql:
  enabled: false
  auth:
    username: midpoint
    password: changeme
    database: midpoint
    existingSecret: ""
    secretKeys:
      adminPasswordKey: ""
  primary:
    persistence:
      enabled: true
      size: 5Gi

# External database configuration (used when postgresql.enabled=false)
externalDatabase:
  host: "midpoint-database-cluster-rw.midpoint.svc.cluster.local"
  port: 5432
  database: midpoint
  username: midpoint
  password: ""
  existingSecret: "midpoint-database-cluster-app"
  existingSecretPasswordKey: "password"

