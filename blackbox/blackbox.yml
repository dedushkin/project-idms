modules:
  http_2xx:
    http:
      follow_redirects: true
      ip_protocol_fallback: false
      preferred_ip_protocol: ip4
      valid_http_versions:
      - HTTP/1.1
      - HTTP/2.0
    prober: http
    timeout: 5s
  http_404:
    http:
      valid_status_codes: [404]
      follow_redirects: true
      ip_protocol_fallback: false
      preferred_ip_protocol: ip4
      valid_http_versions:
      - HTTP/1.1
      - HTTP/2.0
    prober: http
    timeout: 5s
  dns_udp:
    prober: dns
    timeout: 5s
    dns:
      query_name: "grafana.lab.dedushk.in"
      query_type: "CNAME"
      valid_rcodes:
        - NOERROR
      validate_answer_rrs:
        fail_if_not_matches_regexp:
          - "grafana.lab.dedushk.in.\t60\tIN\tCNAME\tenvoy-tigera-gateway-local-gateway-908609cb.tigera-gateway.svc.cluster.local."